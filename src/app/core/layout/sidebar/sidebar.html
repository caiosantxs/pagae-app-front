<div
  class="bg-white text-green-700 h-full flex flex-col p-4 shadow-xl transition-all duration-300 ease-in-out"
  [class.w-64]="!isSidebarCollapsed"
  [class.w-20]="isSidebarCollapsed"
>

  <div
    class="flex items-center justify-between mb-4"
    [class.justify-center]="isSidebarCollapsed"
  >
    @if (!isSidebarCollapsed) {
      <a routerLink="/app" class="text-2xl font-bold text-green-600">
        PagAê
      </a>
    }

    <button
      pButton
      type="button"
      icon="pi pi-bars"
      (click)="toggleSidebar()"
      [class.ml-auto]="!isSidebarCollapsed"
      class="p-button-text p-button-plain p-button-rounded text-green-600 hover:bg-green-100"
    ></button>
  </div>


  <div
    class="mb-6 p-2 flex items-center gap-3 rounded-lg"
    [class.justify-center]="isSidebarCollapsed"
  >
    <div class="w-8 h-8 !bg-green-500 rounded-full flex items-center justify-center font-bold text-white flex-shrink-0">
      {{ username.charAt(0).toUpperCase() }}
    </div>

    @if (!isSidebarCollapsed) {
      <div class="flex flex-col flex-grow min-w-0">
        <span class="font-semibold text-gray-800 text-sm truncate">{{ username }}</span>
      </div>
    }
  </div>


  <nav class="flex-1"> <ul class="flex flex-col gap-2">
      @for (item of items; track item) {
        <li>
          <a
            [routerLink]="item.routerLink"
            routerLinkActive="bg-green-100 text-green-700 font-semibold"
            [title]="isSidebarCollapsed ? item.label : ''"
            class="flex items-center gap-3 p-3 rounded-md text-gray-700 hover:bg-gray-100 transition-colors duration-200"
            [class.justify-center]="isSidebarCollapsed"
          >
            <i [class]="item.icon" class="text-xl flex-shrink-0 w-6 text-center"></i>

            @if (!isSidebarCollapsed) {
              <span class="text-sm">{{ item.label }}</span>
            }
          </a>
        </li>
      }
    </ul>
  </nav>

  <div class="mt-auto"> <div
      (click)="onLogout()"
      [title]="isSidebarCollapsed ? 'Sair' : ''"
      class="p-3 flex items-center gap-3 rounded-md text-gray-700 hover:bg-gray-100 cursor-pointer transition-colors duration-200"
      [class.justify-center]="isSidebarCollapsed"
    >
      <i class="pi pi-sign-out text-xl flex-shrink-0 w-6 text-center"></i>

      @if (!isSidebarCollapsed) {
        <span class="font-semibold text-sm">Sair</span>
      }
    </div>
  </div>
</div>
