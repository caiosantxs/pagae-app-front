<header class="bg-white border-b-4 border-black sticky top-0 z-50 w-full px-4">
  <div class="container mx-auto h-20 flex items-center justify-between">

    <div class="flex items-center">
      <a routerLink="/app/dashboard"
         class="text-3xl font-black text-black tracking-tighter cursor-pointer no-underline hover:text-[#00D177] transition-colors">
        PagaAê<span class="text-[#00D177]">.</span>
      </a>
    </div>

    <nav class="flex items-center gap-2 md:gap-4">

      <a
        routerLink="/app/dashboard"
        routerLinkActive="!bg-[#00D177] !text-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"
        class="px-4 py-2 rounded-xl text-sm font-black text-gray-700 border-2 border-transparent hover:border-black hover:bg-gray-50 cursor-pointer no-underline transition-all duration-150"
      >
        Início
      </a>

      <a
        routerLink="/app/hangouts"
        routerLinkActive="!bg-[#00D177] !text-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"
        class="px-4 py-2 rounded-xl text-sm font-black text-gray-700 border-2 border-transparent hover:border-black hover:bg-gray-50 cursor-pointer no-underline transition-all duration-150"
      >
        Meus Rolês
      </a>

      <a
        routerLink="/app/acertos"
        routerLinkActive="!bg-[#00D177] !text-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"
        class="px-4 py-2 rounded-xl text-sm font-black text-gray-700 border-2 border-transparent hover:border-black hover:bg-gray-50 cursor-pointer no-underline transition-all duration-150"
      >
        Acertos
      </a>

      <div class="w-[2px] h-6 bg-black/10 mx-2 hidden md:block"></div>

      <button
        (click)="logout()"
        class="ml-2 px-4 py-2 rounded-xl text-sm font-black text-red-500 hover:bg-red-50 hover:text-red-600 border-2 border-transparent hover:border-red-600 transition-all cursor-pointer"
      >
        Sair
      </button>
    </nav>

  </div>
</header>
