<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .bg-custom { background-color: #00D177; }
        .btn-shadow { box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); }
        .btn-shadow:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px 0px rgba(0,0,0,1); }
    </style>
</head>
<body class="bg-custom text-black min-h-screen flex flex-col overflow-x-hidden">

    <nav class="flex justify-between items-center p-4 md:p-6 max-w-7xl mx-auto w-full gap-2">
    <div class="text-2xl md:text-3xl font-black tracking-tighter shrink-0">PagaAê</div>
    
    <div class="flex items-center gap-3 md:gap-4 shrink-0">
        <a routerLink="/login" class="text-sm md:text-base font-bold hover:underline">Entrar</a>
        <a routerLink="/register" class="bg-black text-white px-4 md:px-6 py-2 rounded-full font-bold btn-shadow transition-all text-sm md:text-base text-center">
            Registre-se grátis
        </a>
    </div>
</nav>

    <main class="flex-grow flex flex-col items-center justify-center text-center px-4 relative pb-32 pt-16">

        <div class="max-w-3xl z-10">
            <h1 class="text-5xl md:text-7xl font-black leading-none mb-6 tracking-tight text-white drop-shadow-sm">
                Organize os gastos <br> do seu <span class="text-black">rolê</span> com facilidade.
            </h1>
            <p class="text-lg md:text-xl font-medium mb-10 text-white/90 max-w-xl mx-auto">
                Crie e gerencie os gastos de um rolê, receba pagamentos via Pix e alinhe as contas com a galera em segundos.
            </p>
            <button routerLink="/register" class="bg-[#F3FF90] text-black px-10 py-5 rounded-full text-xl font-black btn-shadow transition-all uppercase tracking-wider">
                Criar meu primeiro rolê →
            </button>
        </div>

        <div class="absolute bottom-0 left-0 hidden lg:block w-1/4">
             <img src="assets/images/conceito-de-amizade-feliz-de-vetor-de-doodle-de-saude.png" alt="Personagem 1" class="w-full h-auto">
        </div>
    </main>

    <div class="w-full h-12 bg-black mt-auto"></div>

    <footer class="bg-black py-4 text-white text-center font-bold tracking-widest text-sm uppercase">
        Feito para quem não quer perder tempo fazendo conta no bar
    </footer>

</body>
</html>
