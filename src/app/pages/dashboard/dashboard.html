@if (stats$ | async; as stats) {
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

    <div class="bg-blue-100 text-blue-800 rounded-lg shadow-md p-6 flex justify-between items-center">
      <div>
        <div class="text-4xl font-bold">{{ stats.totalHangouts }}</div>
        <div class="text-lg">Total de Rolês</div>
      </div>
      <i class="pi pi-folder text-5xl text-blue-500"></i>
    </div>

    <div class="bg-red-100 text-red-800 rounded-lg shadow-md p-6 flex justify-between items-center">
      <div>
        <div class="text-4xl font-bold">
          @if( stats.totalOwed == null){
            <div class="text-4xl font-bold">R$ 0,00</div>
          }@else{
            <div class="text-4xl font-bold">{{ stats.totalOwed | currency:'BRL':'symbol' }}</div>
          }
        </div>
        <div class="text-lg">Total a Pagar</div>
      </div>
      <i class="pi pi-thumbs-down text-5xl text-red-500"></i>
    </div>

    <div class="bg-green-100 text-green-800 rounded-lg shadow-md p-6 flex justify-between items-center">
      <div>
        <div class="text-4xl font-bold">R$ 0,00</div>
        <div class="text-lg">Total a Receber</div>
      </div>
      <i class="pi pi-thumbs-up text-5xl text-green-500"></i>
    </div>

  </div>
} @else {
  <p>Carregando estatísticas...</p>
}
