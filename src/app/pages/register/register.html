<div class="min-h-screen bg-white-600 flex items-center justify-center p-4">

  <div class="bg-white rounded-xl shadow-2xl flex w-full max-w-4xl overflow-hidden">

    <div class="hidden md:block md:w-5/12 relative">
      <img
        src="assets/images/registerimg.jpg"
        alt="Imagem de registro com montanhas"
        class="absolute inset-0 w-full h-full object-cover"
      />
    </div>

    <div class="w-full md:w-7/12 p-8 md:p-12">

      <h2 class="text-3xl font-bold text-gray-800 mb-2">Registre-se</h2>
      <p class="text-sm text-gray-600 mb-8">
        Crie sua conta para começar a organizar seus rolês.
      </p>

      <form class="space-y-5">

        <input
          pInputText
          placeholder="Username"
          class="w-full"
          styleClass="!rounded-lg" />

        <input
          pInputText
          placeholder="Email address"
          type="email"
          class="w-full"
          styleClass="rounded-lg"
        />

        <p-password
          [(ngModel)]="password"
          name="password"
          placeholder="Password"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full rounded-lg"
        />

        <p-password
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="Confirm password"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full rounded-lg"
        />

        <p-button
          label="REGISTRAR"
          type="submit"
          styleClass="w-full !p-button-lg !p-button-rounded !bg-green-600 !border-green-600 !text-white !hover:bg-green-700 !hover:border-green-700">
        </p-button>

        <div class="text-center text-sm text-gray-600 pt-2">
          Já tem uma conta?
          <a routerLink="/login" class="font-semibold text-green-600 hover:underline">
            Entrar
          </a>
        </div>

        <p-divider align="center" type="solid">
          <span class="!text-gray-500 font-normal">OU</span>
        </p-divider>

        <p-button
          label="CONTINUAR COM O GOOGLE"
          icon="pi pi-google"
          styleClass="w-full !p-button-outlined !p-button-rounded !text-white-700 !border-gray-400 !bg-green-600">
        </p-button>

        </form>
    </div>
  </div>
</div>
