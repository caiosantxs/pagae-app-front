<div class="min-h-screen bg-[#00D177] flex items-center justify-center p-4">

  <div class="bg-white rounded-3xl border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] flex w-full max-w-4xl overflow-hidden">

    <div class="hidden md:block md:w-5/12 relative border-r-4 border-black">
      <img
        src="assets/images/loginimg.png"
        alt="Imagem de login"
        class="absolute inset-0 w-full h-full object-cover"
      />
      <div class="absolute inset-0 bg-green-800/20"></div>
    </div>

    <div class="w-full md:w-7/12 p-8 md:p-12">

      <h2 class="text-4xl font-black text-gray-950 mb-3 tracking-tighter">Entrar</h2>
      <p class="text-gray-700 font-medium mb-10 leading-snug max-w-sm">
        Bem-vindo de volta! Faça login na sua conta.
      </p>

      <form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="submit()">

        <div>
            <input
              pInputText
              placeholder="Username"
              formControlName="username"
              type="text"
              name="username"
              class="w-full p-4 rounded-xl border-2 border-black
                     bg-white text-gray-900 font-medium
                     focus:outline-none focus:border-green-600 focus:ring-0
                     focus:shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]
                     placeholder:text-gray-400 placeholder:font-normal
                     transition-shadow duration-150"
            />
        </div>

        <div class="relative">
            <p-password
              name="password"
              placeholder="Password"
              formControlName="password"
              [feedback]="false"
              [toggleMask]="true"
              class="w-full"
              inputStyleClass="w-full p-4 rounded-xl border-2 border-black
                               bg-white text-gray-900 font-medium
                               focus:outline-none focus:border-green-600 focus:ring-0
                               placeholder:text-gray-400 placeholder:font-normal
                               transition-shadow duration-150"
              styleClass="w-full"
            />
            <style>
                /* Estilo específico para quando o PrimeNG p-password ganha foco */
                p-password .p-inputtext:focus {
                    box-shadow: 4px 4px 0px 0px rgba(0,0,0,1) !important;
                }
                /* Corrigindo a cor do ícone de toggle mask */
                p-password .p-password-toggle {
                    color: black !important;
                }
            </style>
        </div>

        <div class="text-right pt-1">
          <a href="#" class="text-sm font-bold text-gray-950 hover:underline hover:text-green-700 transition">
            Esqueceu a senha?
          </a>
        </div>

        <p-button
          label="ENTRAR"
          type="submit"
          [disabled]="loginForm.invalid"
          styleClass="w-full p-button-lg !p-4 !rounded-xl !border-2 !border-black !bg-[#F3FF90] !text-black !font-black !text-lg !tracking-wider !shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] !transition-all !duration-150 hover:!translate-y-[-2px] hover:!shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] active:!translate-y-[2px] active:!shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] disabled:!opacity-60 disabled:!shadow-none disabled:!cursor-not-allowed">
        </p-button>

        <div class="text-center text-sm text-gray-700 pt-3">
          Não tem uma conta?
          <a routerLink="/register" class="font-bold text-gray-950 hover:underline hover:text-green-700 transition">
            Registre-se
          </a>
        </div>

        <div class="relative py-4">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300"></div>
            </div>
            <div class="relative flex justify-center">
                <span class="bg-white px-3 text-sm text-gray-500 font-bold uppercase tracking-widest">OU</span>
            </div>
        </div>

        <div class="flex justify-center w-full mt-4">

  <asl-google-signin-button
    type="standard"
    size="large"
    text="continue_with"
    shape="rectangular"
    theme="outline"
    >
  </asl-google-signin-button>

</div>

      </form>
    </div>
  </div>
</div>
