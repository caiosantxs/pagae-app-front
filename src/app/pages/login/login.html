<div class="min-h-screen bg-white flex items-center justify-center p-4">

  <div class="bg-white rounded-2xl shadow-2xl flex w-full max-w-4xl overflow-hidden">

    <div class="hidden md:block md:w-5/12 relative">
      <img
        src="assets/images/loginimg.png"
        alt="Imagem de login"
        class="absolute inset-0 w-full h-full object-cover"
      />
      <div class="absolute inset-0 bg-green-800/20"></div>
    </div>

    <div class="w-full md:w-7/12 p-8 md:p-12">

      <h2 class="text-3xl font-bold text-gray-800 mb-2">Entrar</h2>
      <p class="text-gray-600 mb-8">
        Bem-vindo de volta! Faça login na sua conta.
      </p>

      <form class="space-y-5" [formGroup]="loginForm" (ngSubmit)="submit()">

        <input
          pInputText
          placeholder="Username"
          formControlName="username"
          type="text"
          name="username"
          class="w-full p-3 rounded-lg border border-gray-300
                 bg-white text-gray-900
                 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500"
        />

        <p-password
          name="password"
          placeholder="Password"
          formControlName="password"
          [feedback]="false"
          [toggleMask]="true"
          class="w-full"
          inputStyleClass="w-full p-3 rounded-lg border border-gray-300
                           bg-white text-gray-900
                           focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500"
        />

        <div class="text-right">
          <a href="#" class="text-sm font-semibold text-green-600 hover:underline">
            Esqueceu a senha?
          </a>
        </div>

        <p-button
          label="ENTRAR"
          type="submit"
          [disabled]="loginForm.invalid"
          styleClass="w-full p-button-lg p-button-rounded !bg-green-600 !border-green-600 text-white !hover:bg-green-700 !hover:border-green-700">
        </p-button>

        <div class="text-center text-sm text-gray-600 pt-2">
          Não tem uma conta?
          <a routerLink="/register" class="font-semibold text-green-600 hover:underline">
            Registre-se
          </a>
        </div>

        <p-divider align="center" type="solid">
          <span class="text-gray-500 font-normal">OU</span>
        </p-divider>

        <p-button
          label="CONTINUAR COM O GOOGLE"
          icon="pi pi-google"
          styleClass="w-full p-button-outlined p-button-rounded !text-green-600 !border-green-600">
        </p-button>

      </form>
    </div>
  </div>
</div>
