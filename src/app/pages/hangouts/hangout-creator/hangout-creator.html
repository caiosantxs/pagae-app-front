<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">

  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="mx-auto h-12 w-12 bg-green-100 rounded-xl flex items-center justify-center text-green-600 mb-4">
      <i class="pi pi-plus text-xl font-bold"></i>
    </div>

    <h2 class="text-center text-3xl font-extrabold text-gray-900">
      Criar novo rolê
    </h2>
    <p class="mt-2 text-center text-sm text-gray-600">
      Dê um nome e descreva o evento para começar a dividir contas.
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow sm:rounded-xl sm:px-10 border border-gray-100">

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">

        <div>
          <label for="title" class="block text-sm font-medium text-gray-700 mb-1">
            Nome do Rolê <span class="text-red-500">*</span>
          </label>
          <div class="mt-1">
            <input
              pInputText
              id="title"
              formControlName="title"
              class="w-full !p-3"
              placeholder="Ex: Viagem Cabo Frio"
              [class.ng-dirty]="form.get('title')?.touched"
            />
          </div>
          @if (form.get('title')?.invalid && form.get('title')?.touched) {
            <small class="block text-red-500 mt-1">
              O nome é obrigatório (mínimo 3 caracteres).
            </small>
          }
        </div>

        <div>
          <label for="description" class="block text-sm font-medium text-gray-700 mb-1">
            Descrição <span class="text-gray-400 font-normal">(Opcional)</span>
          </label>
          <div class="mt-1">
            <textarea
              pInputTextarea
              id="description"
              formControlName="description"
              rows="4"
              class="w-full !p-3 !resize-none"
              placeholder="Ex: Contas de mercado, gasolina e hospedagem...">
            </textarea>
          </div>
        </div>

        <div class="flex items-center gap-4 pt-2">
          <button
            type="button"
            pButton
            label="Cancelar"
            routerLink="/hangouts"
            class="p-button-outlined p-button-secondary w-full justify-center !font-bold">
          </button>

          <button
            type="submit"
            pButton
            [label]="loading ? 'Criando...' : 'Criar Rolê'"
            [icon]="loading ? 'pi pi-spin pi-spinner' : 'pi pi-check'"
            [disabled]="form.invalid || loading"
            class="!bg-green-600 !border-green-600 w-full justify-center !font-bold hover:!bg-green-700">
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
