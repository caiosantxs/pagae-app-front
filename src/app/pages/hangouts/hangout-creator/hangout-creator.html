<div
  class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8"
>
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div
      class="mx-auto h-12 w-12 bg-green-100 rounded-xl flex items-center justify-center text-green-600 mb-4"
    >
      <i class="pi pi-plus text-xl font-bold"></i>
    </div>

    <h2 class="text-center text-3xl font-extrabold text-gray-900">
      Criar novo rolê
    </h2>
    <p class="mt-2 text-center text-sm text-gray-600">
      Dê um nome e descreva o evento para começar a dividir contas.
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div
      class="bg-white py-8 px-4 shadow sm:rounded-xl sm:px-10 border border-gray-100"
    >
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label
            for="title"
            class="block text-sm font-medium text-gray-700 mb-1"
          >
            Nome do Rolê <span class="text-red-500">*</span>
          </label>
          <div class="mt-1">
            <input
              pInputText
              id="title"
              formControlName="title"
              class="w-full !p-3"
              placeholder="Ex: Viagem Cabo Frio"
              [class.ng-dirty]="form.get('title')?.touched"
            />
          </div>
          @if (form.get('title')?.invalid && form.get('title')?.touched) {
          <small class="block text-red-500 mt-1">
            O nome é obrigatório (mínimo 3 caracteres).
          </small>
          }
        </div>

        <div class="mt-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Convidar Membros
            <span class="text-gray-400 font-normal"
              >(Busque por nome ou login)</span
            >
          </label>

          <p-autoComplete
            formControlName="memberIds"
            [suggestions]="filteredUsers"
            (completeMethod)="filterUsers($event)"
            field="name"
            dataKey="id"
            [multiple]="true"
            [forceSelection]="true"
            [dropdown]="false"
            placeholder="Digite para buscar..."
            class="w-full"
            [style]="{ width: '100%' }"
            [inputStyle]="{ width: '100%' }"
          >
            <ng-template let-user pTemplate="item"> </ng-template>

            <ng-template let-value pTemplate="selectedItem">
              <div class="flex items-center gap-2">
                <span class="text-sm">{{ value.name }}</span>
              </div>
            </ng-template>

            <ng-template let-user pTemplate="item">
              <div class="flex items-center gap-2">
                <div
                  class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center text-green-700 font-bold text-xs"
                >
                  {{ user.name ? user.name.charAt(0).toUpperCase() : "?" }}
                </div>

                <div class="flex flex-col">
                  <span class="font-medium text-gray-900 leading-none">{{
                    user.name
                  }}</span>
                  <span class="text-xs text-gray-500 mt-1"
                    >@{{ user.login }}</span
                  >
                </div>
              </div>
            </ng-template>
          </p-autoComplete>
        </div>

        <div class="flex items-center gap-4 pt-2">
          <button
            type="button"
            pButton
            label="Cancelar"
            routerLink="/app/hangouts"
            class="p-button-outlined p-button-secondary w-full justify-center !font-bold"
          ></button>

          <button
            type="submit"
            pButton
            [label]="loading ? 'Criando...' : 'Criar Rolê'"
            [icon]="loading ? 'pi pi-spin pi-spinner' : 'pi pi-check'"
            [disabled]="form.invalid || loading"
            class="!bg-green-600 !border-green-600 w-full justify-center !font-bold hover:!bg-green-700"
          ></button>
        </div>
      </form>
    </div>
  </div>
</div>
